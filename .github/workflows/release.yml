name: Build & Release

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android'
        required: true
        default: true
        type: boolean
      build_ios:
        description: 'Build iOS'
        required: true
        default: true
        type: boolean
      build_macos:
        description: 'Build macOS'
        required: true
        default: true
        type: boolean
      build_windows:
        description: 'Build Windows'
        required: true
        default: true
        type: boolean
      build_linux:
        description: 'Build Linux'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - name: Extract Version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create Dummy Assets Dir
        run: mkdir -p assets/plugins/

  create_release:
    name: Create Release
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.version.outputs.version }}
          name: ${{ needs.version.outputs.version }}
          bodyFile: "CHANGELOG.md"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}

  android:
    name: Android Build
    needs: [version, create_release]
    if: ${{ github.event.inputs.build_android == 'true' }}
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Install Dependencies
        run: |
          flutter pub get
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs

      # Remove desktop TorrServer binaries to reduce APK size by ~170MB
      # These are only needed for macOS, Windows, and Linux
      - name: Strip Desktop Binaries
        run: rm -f packages/flutter_torrent_server/assets/torrserver/TorrServer-*
        
      - name: Decode Keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
          echo "storePassword=$ANDROID_STORE_PASSWORD" > android/key.properties
          echo "keyPassword=$ANDROID_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$ANDROID_KEY_ALIAS" >> android/key.properties
          echo "storeFile=release.jks" >> android/key.properties

      - name: Generate dart-defines file
        shell: bash
        run: |
          cat > dart-defines.json << 'JSON_EOF'
          {
            "TMDB_API_KEY": "${{ secrets.TMDB_API_KEY }}",
            "SIMKL_CLIENT_ID": "${{ secrets.SIMKL_CLIENT_ID }}",
            "SIMKL_CLIENT_SECRET": "${{ secrets.SIMKL_CLIENT_SECRET }}",
            "TRAKT_CLIENT_ID": "${{ secrets.TRAKT_CLIENT_ID }}",
            "TRAKT_CLIENT_SECRET": "${{ secrets.TRAKT_CLIENT_SECRET }}",
            "MAL_CLIENT_ID": "${{ secrets.MAL_CLIENT_ID }}",
            "ANILIST_CLIENT_ID": "${{ secrets.ANILIST_CLIENT_ID }}",
            "ANIMESKIP_CLIENT_ID": "${{ secrets.ANIMESKIP_CLIENT_ID }}"
          }
          JSON_EOF

      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi --dart-define-from-file=dart-defines.json

      - name: Build Universal APK
        run: flutter build apk --release --dart-define-from-file=dart-defines.json

      - name: Build Debug APK
        run: flutter build apk --debug --dart-define-from-file=dart-defines.json

      - name: Rename APKs
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          cd build/app/outputs/flutter-apk/
          
          # Universal Release
          if [ -f "app-release.apk" ]; then
            mv "app-release.apk" "../../../../skystream-android-universal-${VERSION}.apk"
          fi
          
          # Universal Debug
          if [ -f "app-debug.apk" ]; then
            mv "app-debug.apk" "../../../../skystream-android-debug-${VERSION}.apk"
          fi
          
          # Splits
          for f in app-*-release.apk; do
            if [ -f "$f" ]; then
              # Extract ABI: app-<abi>-release.apk -> <abi>
              abi="${f#app-}"
              abi="${abi%-release.apk}"
              mv "$f" "../../../../skystream-android-${abi}-${VERSION}.apk"
            fi
          done

      - name: Upload Release Assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.version.outputs.version }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "*.apk"
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}

  ios:
    name: iOS Build (Unsigned)
    needs: [version, create_release]
    if: ${{ github.event.inputs.build_ios == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Select Latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: |
          flutter pub get
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs

      - name: Generate dart-defines file
        shell: bash
        run: |
          cat > dart-defines.json << 'JSON_EOF'
          {
            "TMDB_API_KEY": "${{ secrets.TMDB_API_KEY }}",
            "SIMKL_CLIENT_ID": "${{ secrets.SIMKL_CLIENT_ID }}",
            "SIMKL_CLIENT_SECRET": "${{ secrets.SIMKL_CLIENT_SECRET }}",
            "TRAKT_CLIENT_ID": "${{ secrets.TRAKT_CLIENT_ID }}",
            "TRAKT_CLIENT_SECRET": "${{ secrets.TRAKT_CLIENT_SECRET }}",
            "MAL_CLIENT_ID": "${{ secrets.MAL_CLIENT_ID }}",
            "ANILIST_CLIENT_ID": "${{ secrets.ANILIST_CLIENT_ID }}",
            "ANIMESKIP_CLIENT_ID": "${{ secrets.ANIMESKIP_CLIENT_ID }}"
          }
          JSON_EOF

      - name: Build iOS (No Codesign)
        run: |
          flutter build ios --release --no-codesign --dart-define-from-file=dart-defines.json
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r skystream-ios-unsigned-${{ needs.version.outputs.version }}.ipa Payload
          
      - name: Upload Release Assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.version.outputs.version }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "skystream-ios-unsigned-${{ needs.version.outputs.version }}.ipa"
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}

  macos:
    name: macOS Build
    needs: [version, create_release]
    if: ${{ github.event.inputs.build_macos == 'true' }}
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
        include:
          - arch: arm64
            torrserver_binary: TorrServer-darwin-arm64
            xcode_arch: arm64
          - arch: x64
            torrserver_binary: TorrServer-darwin-amd64
            xcode_arch: x86_64
    steps:
      - uses: actions/checkout@v5
      - name: Select Latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: |
          flutter config --enable-macos-desktop
          flutter pub get
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs

      # Keep only the required TorrServer binary for this architecture
      - name: Strip Unused Binaries
        run: |
          cd packages/flutter_torrent_server/assets/torrserver
          ls -la
          # Keep only the binary for this architecture
          find . -type f ! -name "${{ matrix.torrserver_binary }}" -delete
          ls -la
          
      - name: Generate dart-defines file
        shell: bash
        run: |
          cat > dart-defines.json << 'JSON_EOF'
          {
            "TMDB_API_KEY": "${{ secrets.TMDB_API_KEY }}",
            "SIMKL_CLIENT_ID": "${{ secrets.SIMKL_CLIENT_ID }}",
            "SIMKL_CLIENT_SECRET": "${{ secrets.SIMKL_CLIENT_SECRET }}",
            "TRAKT_CLIENT_ID": "${{ secrets.TRAKT_CLIENT_ID }}",
            "TRAKT_CLIENT_SECRET": "${{ secrets.TRAKT_CLIENT_SECRET }}",
            "MAL_CLIENT_ID": "${{ secrets.MAL_CLIENT_ID }}",
            "ANILIST_CLIENT_ID": "${{ secrets.ANILIST_CLIENT_ID }}",
            "ANIMESKIP_CLIENT_ID": "${{ secrets.ANIMESKIP_CLIENT_ID }}"
          }
          JSON_EOF

      # Build for a single architecture to reduce app size from ~430MB (universal) to ~270MB
      - name: Build macOS (${{ matrix.arch }})
        run: |
          # First, generate the Xcode project with flutter
          flutter build macos --release --config-only --dart-define-from-file=dart-defines.json
          
          # Build using xcodebuild with single architecture
          cd macos
          xcodebuild -workspace Runner.xcworkspace \
            -configuration Release \
            -scheme Runner \
            -derivedDataPath ../build/macos \
            ARCHS="${{ matrix.xcode_arch }}" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
      
      # Re-sign all frameworks to fix media_kit MPV crash (Issue #830)
      # The frameworks built in CI have code signing issues that cause
      # assertion failures in mpv_render_context_create
      - name: Re-sign Frameworks
        run: |
          APP_PATH="build/macos/Build/Products/Release/skystream.app"
          FRAMEWORKS_PATH="$APP_PATH/Contents/Frameworks"
          
          echo "Re-signing frameworks..."
          find "$FRAMEWORKS_PATH" -name "*.framework" -type d | while read framework; do
            echo "Signing: $framework"
            codesign --force --deep --sign - "$framework"
          done
          
          # Also sign any dylibs
          find "$FRAMEWORKS_PATH" -name "*.dylib" -type f | while read dylib; do
            echo "Signing: $dylib"
            codesign --force --sign - "$dylib"
          done
          
          # Sign the main app
          echo "Signing app..."
          codesign --force --deep --sign - "$APP_PATH"
          
          echo "Done re-signing."
        
      # CRITICAL: Use -y flag to preserve symlinks!
      # macOS frameworks contain symlinks (e.g., Mpv.framework/Mpv -> Versions/A/Mpv)
      # Without -y, zip stores the file content instead of the symlink,
      # causing MPV's internal config to fail with assertion errors.
      - name: Generate DMG and Zip
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          cd build/macos/Build/Products/Release
          
          # Create DMG
          mkdir -p dmg_temp
          cp -R skystream.app dmg_temp/
          ln -s /Applications dmg_temp/Applications
          hdiutil create -volname "SkyStream" -srcfolder dmg_temp -ov -format UDZO "../../../../../skystream-macos-${{ matrix.arch }}-${VERSION}.dmg"
          
          # Fallback ZIP
          zip -ry "../../../../../skystream-macos-${{ matrix.arch }}-${VERSION}.zip" skystream.app

      - name: Upload Release Assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.version.outputs.version }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: |
            skystream-macos-${{ matrix.arch }}-${{ needs.version.outputs.version }}.dmg
            skystream-macos-${{ matrix.arch }}-${{ needs.version.outputs.version }}.zip
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}

  windows:
    name: Windows Build
    needs: [version, create_release]
    if: ${{ github.event.inputs.build_windows == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-2022
            arch: x64
            torrserver_binary: TorrServer-windows-amd64.exe
    steps:
      - uses: actions/checkout@v5
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Dependencies
        run: |
          flutter config --enable-windows-desktop
          flutter pub get
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs

      # Keep only the Windows TorrServer binary
      - name: Strip Unused Binaries
        shell: pwsh
        run: |
          cd packages/flutter_torrent_server/assets/torrserver
          Get-ChildItem -File | Where-Object { $_.Name -ne "${{ matrix.torrserver_binary }}" } | Remove-Item
          Get-ChildItem

      - name: Download libmpv-2.dll
        shell: pwsh
        run: |
          choco install 7zip -y --no-progress
          $assetPattern = '^mpv-dev-x86_64-(?!v\d+-)\d{8}-git-[a-f0-9]+\.7z$'

          $release = Invoke-RestMethod -Uri 'https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest'
          $asset = $release.assets | Where-Object { $_.name -match $assetPattern } | Select-Object -First 1
          if (-not $asset) {
            throw "Could not find matching mpv asset for pattern: $assetPattern"
          }

          $archivePath = Join-Path $env:RUNNER_TEMP 'mpv-dev.7z'
          $extractDir = Join-Path $env:RUNNER_TEMP 'mpv-dev-extract'
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $archivePath
          New-Item -ItemType Directory -Path $extractDir -Force | Out-Null
          & 7z x $archivePath "-o$extractDir" -y | Out-Null

          $dll = Get-ChildItem -Path $extractDir -Filter 'libmpv-2.dll' -Recurse | Select-Object -First 1
          if (-not $dll) {
            throw 'libmpv-2.dll was not found in extracted mpv archive'
          }

          "SKYSTREAM_WINDOWS_MPV_DLL=$($dll.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using downloaded libmpv: $($dll.FullName)"

      - name: Generate dart-defines file
        shell: bash
        run: |
          cat > dart-defines.json << 'JSON_EOF'
          {
            "TMDB_API_KEY": "${{ secrets.TMDB_API_KEY }}",
            "SIMKL_CLIENT_ID": "${{ secrets.SIMKL_CLIENT_ID }}",
            "SIMKL_CLIENT_SECRET": "${{ secrets.SIMKL_CLIENT_SECRET }}",
            "TRAKT_CLIENT_ID": "${{ secrets.TRAKT_CLIENT_ID }}",
            "TRAKT_CLIENT_SECRET": "${{ secrets.TRAKT_CLIENT_SECRET }}",
            "MAL_CLIENT_ID": "${{ secrets.MAL_CLIENT_ID }}",
            "ANILIST_CLIENT_ID": "${{ secrets.ANILIST_CLIENT_ID }}",
            "ANIMESKIP_CLIENT_ID": "${{ secrets.ANIMESKIP_CLIENT_ID }}"
          }
          JSON_EOF

      - name: Build Windows
        run: flutter build windows --release --dart-define-from-file=dart-defines.json

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Installer (EXE)
        shell: pwsh
        run: |
          $Version = "${{ needs.version.outputs.version }}".TrimStart('v')
          $AppDir = "..\..\..\build\windows\${{ matrix.arch }}\runner\Release"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$Version /DAppArch=${{ matrix.arch }} /DAppDir=$AppDir windows\packaging\exe\setup.iss

      - name: Compress Release (ZIP)
        shell: pwsh
        run: |
          $Version = "${{ needs.version.outputs.version }}"
          Compress-Archive -Path build\windows\${{ matrix.arch }}\runner\Release\* -DestinationPath "skystream-windows-${{ matrix.arch }}-$Version.zip"

      - name: Upload Release Assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.version.outputs.version }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: |
            windows/packaging/exe/Output/*.exe
            skystream-windows-${{ matrix.arch }}-${{ needs.version.outputs.version }}.zip
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}

  linux:
    name: Linux Build
    needs: [version, create_release]
    if: ${{ github.event.inputs.build_linux == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            torrserver_binary: TorrServer-linux-amd64
          - os: ubuntu-22.04-arm
            arch: arm64
            torrserver_binary: TorrServer-linux-arm64
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        if: ${{ matrix.arch != 'arm64' }}
        with:
          channel: 'stable'
      - name: Setup Flutter (ARM64 Linux)
        if: ${{ matrix.arch == 'arm64' }}
        run: |
          git clone https://github.com/flutter/flutter.git -b stable $RUNNER_TOOL_CACHE/flutter
          echo "$RUNNER_TOOL_CACHE/flutter/bin" >> $GITHUB_PATH
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmpv-dev libasound2-dev
          
      - name: Install Flutter Dependencies
        run: |
          flutter config --enable-linux-desktop
          flutter pub get
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs

      # Keep only the Linux TorrServer binary
      - name: Strip Unused Binaries
        run: |
          cd packages/flutter_torrent_server/assets/torrserver
          ls -la
          find . -type f ! -name "${{ matrix.torrserver_binary }}" -delete
          ls -la
          
      - name: Generate dart-defines file
        shell: bash
        run: |
          cat > dart-defines.json << 'JSON_EOF'
          {
            "TMDB_API_KEY": "${{ secrets.TMDB_API_KEY }}",
            "SIMKL_CLIENT_ID": "${{ secrets.SIMKL_CLIENT_ID }}",
            "SIMKL_CLIENT_SECRET": "${{ secrets.SIMKL_CLIENT_SECRET }}",
            "TRAKT_CLIENT_ID": "${{ secrets.TRAKT_CLIENT_ID }}",
            "TRAKT_CLIENT_SECRET": "${{ secrets.TRAKT_CLIENT_SECRET }}",
            "MAL_CLIENT_ID": "${{ secrets.MAL_CLIENT_ID }}",
            "ANILIST_CLIENT_ID": "${{ secrets.ANILIST_CLIENT_ID }}",
            "ANIMESKIP_CLIENT_ID": "${{ secrets.ANIMESKIP_CLIENT_ID }}"
          }
          JSON_EOF

      - name: Build Linux Packages
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          export PATH="$PATH:$HOME/.pub-cache/bin"
          dart pub global activate fastforge

          # Build .deb (AppImage is currently disabled due to tool-level file collision bugs)
          fastforge package --platform linux --targets deb --build-dart-define-from-file=dart-defines.json

          # Rename .deb file to match tar.gz convention
          mv dist/*/*.deb "skystream-linux-${{ matrix.arch }}-${VERSION}.deb"

          # Generate the standard .tar.gz bundle as well
          flutter build linux --release --dart-define-from-file=dart-defines.json
          cd build/linux/${{ matrix.arch }}/release/bundle
          tar -czvf "../../../../../skystream-linux-${{ matrix.arch }}-${VERSION}.tar.gz" .

      - name: Upload Release Assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.version.outputs.version }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: |
            skystream-linux-${{ matrix.arch }}-${{ needs.version.outputs.version }}.tar.gz
            skystream-linux-${{ matrix.arch }}-${{ needs.version.outputs.version }}.deb
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}
