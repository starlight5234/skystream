name: Build Preview

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'
        type: string
      build_android:
        description: 'Build Android'
        required: true
        default: true
        type: boolean
      build_ios:
        description: 'Build iOS'
        required: true
        default: true
        type: boolean
      build_macos:
        description: 'Build macOS'
        required: true
        default: true
        type: boolean
      build_windows:
        description: 'Build Windows'
        required: true
        default: true
        type: boolean
      build_linux:
        description: 'Build Linux'
        required: true
        default: true
        type: boolean

jobs:
  android:
    name: Android Build
    if: ${{ github.event.inputs.build_android == 'true' }}
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch }}
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Install Dependencies
        run: |
          flutter pub get
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs

      # Remove desktop TorrServer binaries to reduce APK size
      - name: Strip Desktop Binaries
        run: rm -f packages/flutter_torrent_server/assets/torrserver/TorrServer-*
        
      - name: Decode Keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
          echo "storePassword=$ANDROID_STORE_PASSWORD" > android/key.properties
          echo "keyPassword=$ANDROID_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$ANDROID_KEY_ALIAS" >> android/key.properties
          echo "storeFile=release.jks" >> android/key.properties

      - name: Generate dart-defines file
        shell: bash
        run: |
          cat > dart-defines.json << 'JSON_EOF'
          {
            "TMDB_API_KEY": "${{ secrets.TMDB_API_KEY }}",
            "SIMKL_CLIENT_ID": "${{ secrets.SIMKL_CLIENT_ID }}",
            "SIMKL_CLIENT_SECRET": "${{ secrets.SIMKL_CLIENT_SECRET }}",
            "TRAKT_CLIENT_ID": "${{ secrets.TRAKT_CLIENT_ID }}",
            "TRAKT_CLIENT_SECRET": "${{ secrets.TRAKT_CLIENT_SECRET }}",
            "MAL_CLIENT_ID": "${{ secrets.MAL_CLIENT_ID }}",
            "MAL_CLIENT_SECRET": "${{ secrets.MAL_CLIENT_SECRET }}",
            "ANILIST_CLIENT_ID": "${{ secrets.ANILIST_CLIENT_ID }}",
            "ANIMESKIP_CLIENT_ID": "${{ secrets.ANIMESKIP_CLIENT_ID }}",
            "SUPABASE_PROJECT_ID": "${{ secrets.SUPABASE_PROJECT_ID }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "TURN_USERNAME": "${{ secrets.TURN_USERNAME }}",
            "TURN_PASSWORD": "${{ secrets.TURN_PASSWORD }}"
          }
          JSON_EOF

      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi --dart-define-from-file=dart-defines.json

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7

  ios:
    name: iOS Build (Unsigned)
    if: ${{ github.event.inputs.build_ios == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch }}
      - name: Select Latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: |
          flutter pub get
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs

      - name: Generate dart-defines file
        shell: bash
        run: |
          cat > dart-defines.json << 'JSON_EOF'
          {
            "TMDB_API_KEY": "${{ secrets.TMDB_API_KEY }}",
            "SIMKL_CLIENT_ID": "${{ secrets.SIMKL_CLIENT_ID }}",
            "SIMKL_CLIENT_SECRET": "${{ secrets.SIMKL_CLIENT_SECRET }}",
            "TRAKT_CLIENT_ID": "${{ secrets.TRAKT_CLIENT_ID }}",
            "TRAKT_CLIENT_SECRET": "${{ secrets.TRAKT_CLIENT_SECRET }}",
            "MAL_CLIENT_ID": "${{ secrets.MAL_CLIENT_ID }}",
            "MAL_CLIENT_SECRET": "${{ secrets.MAL_CLIENT_SECRET }}",
            "ANILIST_CLIENT_ID": "${{ secrets.ANILIST_CLIENT_ID }}",
            "ANIMESKIP_CLIENT_ID": "${{ secrets.ANIMESKIP_CLIENT_ID }}",
            "SUPABASE_PROJECT_ID": "${{ secrets.SUPABASE_PROJECT_ID }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "TURN_USERNAME": "${{ secrets.TURN_USERNAME }}",
            "TURN_PASSWORD": "${{ secrets.TURN_PASSWORD }}"
          }
          JSON_EOF

      - name: Build iOS (No Codesign)
        run: |
          flutter build ios --release --no-codesign --dart-define-from-file=dart-defines.json
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r skystream-ios-unsigned.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: skystream-ios-unsigned.ipa
          retention-days: 7

  macos:
    name: macOS Build (${{ matrix.arch }})
    if: ${{ github.event.inputs.build_macos == 'true' }}
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
        include:
          - arch: arm64
            torrserver_binary: TorrServer-darwin-arm64
            xcode_arch: arm64
          - arch: x64
            torrserver_binary: TorrServer-darwin-amd64
            xcode_arch: x86_64
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch }}
      - name: Select Latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: |
          flutter config --enable-macos-desktop
          flutter pub get
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs

      - name: Strip Unused Binaries
        run: |
          cd packages/flutter_torrent_server/assets/torrserver
          find . -type f ! -name "${{ matrix.torrserver_binary }}" -delete

      - name: Generate dart-defines file
        shell: bash
        run: |
          cat > dart-defines.json << 'JSON_EOF'
          {
            "TMDB_API_KEY": "${{ secrets.TMDB_API_KEY }}",
            "SIMKL_CLIENT_ID": "${{ secrets.SIMKL_CLIENT_ID }}",
            "SIMKL_CLIENT_SECRET": "${{ secrets.SIMKL_CLIENT_SECRET }}",
            "TRAKT_CLIENT_ID": "${{ secrets.TRAKT_CLIENT_ID }}",
            "TRAKT_CLIENT_SECRET": "${{ secrets.TRAKT_CLIENT_SECRET }}",
            "MAL_CLIENT_ID": "${{ secrets.MAL_CLIENT_ID }}",
            "MAL_CLIENT_SECRET": "${{ secrets.MAL_CLIENT_SECRET }}",
            "ANILIST_CLIENT_ID": "${{ secrets.ANILIST_CLIENT_ID }}",
            "ANIMESKIP_CLIENT_ID": "${{ secrets.ANIMESKIP_CLIENT_ID }}",
            "SUPABASE_PROJECT_ID": "${{ secrets.SUPABASE_PROJECT_ID }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "TURN_USERNAME": "${{ secrets.TURN_USERNAME }}",
            "TURN_PASSWORD": "${{ secrets.TURN_PASSWORD }}"
          }
          JSON_EOF

      # Build for a single architecture to reduce app size from ~430MB (universal) to ~270MB
      - name: Build macOS
        run: |
          flutter build macos --release --config-only --dart-define-from-file=dart-defines.json
          cd macos
          xcodebuild -workspace Runner.xcworkspace \
            -configuration Release \
            -scheme Runner \
            -derivedDataPath ../build/macos \
            ARCHS="${{ matrix.xcode_arch }}" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
      
      # Re-sign all frameworks to fix media_kit MPV crash (Issue #830)
      - name: Re-sign Frameworks
        run: |
          APP_PATH="build/macos/Build/Products/Release/skystream.app"
          FRAMEWORKS_PATH="$APP_PATH/Contents/Frameworks"
          
          echo "Re-signing frameworks..."
          find "$FRAMEWORKS_PATH" -name "*.framework" -type d | while read framework; do
            echo "Signing: $framework"
            codesign --force --deep --sign - "$framework"
          done
          
          find "$FRAMEWORKS_PATH" -name "*.dylib" -type f | while read dylib; do
            echo "Signing: $dylib"
            codesign --force --sign - "$dylib"
          done
          
          echo "Signing app..."
          codesign --force --deep --sign - "$APP_PATH"
        
      # CRITICAL: Use -y flag to preserve symlinks (required for macOS frameworks)
      - name: Generate DMG and Zip
        run: |
          cd build/macos/Build/Products/Release
          
          # Create DMG
          mkdir -p dmg_temp
          cp -R skystream.app dmg_temp/
          ln -s /Applications dmg_temp/Applications
          hdiutil create -volname "SkyStream" -srcfolder dmg_temp -ov -format UDZO "../../../../../skystream-macos-${{ matrix.arch }}-preview.dmg"
          
          # Fallback ZIP
          zip -ry "../../../../../skystream-macos-${{ matrix.arch }}-preview.zip" skystream.app

      - name: Upload macOS Build
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            skystream-macos-${{ matrix.arch }}-preview.dmg
            skystream-macos-${{ matrix.arch }}-preview.zip
          retention-days: 7

  windows:
    name: Windows Build (${{ matrix.arch }})
    if: ${{ github.event.inputs.build_windows == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-2022
            arch: x64
            torrserver_binary: TorrServer-windows-amd64.exe
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: |
          flutter config --enable-windows-desktop
          flutter pub get
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs

      - name: Strip Unused Binaries
        shell: pwsh
        run: |
          cd packages/flutter_torrent_server/assets/torrserver
          Get-ChildItem -File | Where-Object { $_.Name -ne "${{ matrix.torrserver_binary }}" } | Remove-Item

      - name: Download libmpv-2.dll
        shell: pwsh
        run: |
          choco install 7zip -y --no-progress
          $assetPattern = '^mpv-dev-x86_64-(?!v\d+-)\d{8}-git-[a-f0-9]+\.7z$'

          $release = Invoke-RestMethod -Uri 'https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest'
          $asset = $release.assets | Where-Object { $_.name -match $assetPattern } | Select-Object -First 1
          if (-not $asset) {
            throw "Could not find matching mpv asset for pattern: $assetPattern"
          }

          $archivePath = Join-Path $env:RUNNER_TEMP 'mpv-dev.7z'
          $extractDir = Join-Path $env:RUNNER_TEMP 'mpv-dev-extract'
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $archivePath
          New-Item -ItemType Directory -Path $extractDir -Force | Out-Null
          & 7z x $archivePath "-o$extractDir" -y | Out-Null

          $dll = Get-ChildItem -Path $extractDir -Filter 'libmpv-2.dll' -Recurse | Select-Object -First 1
          if (-not $dll) {
            throw 'libmpv-2.dll was not found in extracted mpv archive'
          }

          "SKYSTREAM_WINDOWS_MPV_DLL=$($dll.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using downloaded libmpv: $($dll.FullName)"

      - name: Generate dart-defines file
        shell: bash
        run: |
          cat > dart-defines.json << 'JSON_EOF'
          {
            "TMDB_API_KEY": "${{ secrets.TMDB_API_KEY }}",
            "SIMKL_CLIENT_ID": "${{ secrets.SIMKL_CLIENT_ID }}",
            "SIMKL_CLIENT_SECRET": "${{ secrets.SIMKL_CLIENT_SECRET }}",
            "TRAKT_CLIENT_ID": "${{ secrets.TRAKT_CLIENT_ID }}",
            "TRAKT_CLIENT_SECRET": "${{ secrets.TRAKT_CLIENT_SECRET }}",
            "MAL_CLIENT_ID": "${{ secrets.MAL_CLIENT_ID }}",
            "MAL_CLIENT_SECRET": "${{ secrets.MAL_CLIENT_SECRET }}",
            "ANILIST_CLIENT_ID": "${{ secrets.ANILIST_CLIENT_ID }}",
            "ANIMESKIP_CLIENT_ID": "${{ secrets.ANIMESKIP_CLIENT_ID }}",
            "SUPABASE_PROJECT_ID": "${{ secrets.SUPABASE_PROJECT_ID }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "TURN_USERNAME": "${{ secrets.TURN_USERNAME }}",
            "TURN_PASSWORD": "${{ secrets.TURN_PASSWORD }}"
          }
          JSON_EOF

      - name: Build Windows
        run: flutter build windows --release --dart-define-from-file=dart-defines.json

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Installer (EXE)
        shell: pwsh
        run: |
          $AppDir = "..\..\..\build\windows\${{ matrix.arch }}\runner\Release"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=preview /DAppArch=${{ matrix.arch }} /DAppDir=$AppDir windows\packaging\exe\setup.iss

      - name: Compress Release
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\${{ matrix.arch }}\runner\Release\* -DestinationPath "skystream-windows-${{ matrix.arch }}-preview.zip"

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            windows/packaging/exe/Output/*.exe
            skystream-windows-${{ matrix.arch }}-preview.zip
          retention-days: 7

  linux:
    name: Linux Build (${{ matrix.arch }})
    if: ${{ github.event.inputs.build_linux == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            torrserver_binary: TorrServer-linux-amd64
          - os: ubuntu-22.04-arm
            arch: arm64
            torrserver_binary: TorrServer-linux-arm64
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch }}
      - uses: subosito/flutter-action@v2
        if: ${{ matrix.arch != 'arm64' }}
        with:
          channel: 'stable'
      - name: Setup Flutter (ARM64 Linux)
        if: ${{ matrix.arch == 'arm64' }}
        run: |
          git clone https://github.com/flutter/flutter.git -b stable $RUNNER_TOOL_CACHE/flutter
          echo "$RUNNER_TOOL_CACHE/flutter/bin" >> $GITHUB_PATH

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmpv-dev libasound2-dev libsecret-1-dev
          
      - name: Install Flutter Dependencies
        run: |
          flutter config --enable-linux-desktop
          flutter pub get
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs
      - name: Strip Unused Binaries
        run: |
          cd packages/flutter_torrent_server/assets/torrserver
          find . -type f ! -name "${{ matrix.torrserver_binary }}" -delete

      - name: Generate dart-defines file
        shell: bash
        run: |
          cat > dart-defines.json << 'JSON_EOF'
          {
            "TMDB_API_KEY": "${{ secrets.TMDB_API_KEY }}",
            "SIMKL_CLIENT_ID": "${{ secrets.SIMKL_CLIENT_ID }}",
            "SIMKL_CLIENT_SECRET": "${{ secrets.SIMKL_CLIENT_SECRET }}",
            "TRAKT_CLIENT_ID": "${{ secrets.TRAKT_CLIENT_ID }}",
            "TRAKT_CLIENT_SECRET": "${{ secrets.TRAKT_CLIENT_SECRET }}",
            "MAL_CLIENT_ID": "${{ secrets.MAL_CLIENT_ID }}",
            "MAL_CLIENT_SECRET": "${{ secrets.MAL_CLIENT_SECRET }}",
            "ANILIST_CLIENT_ID": "${{ secrets.ANILIST_CLIENT_ID }}",
            "ANIMESKIP_CLIENT_ID": "${{ secrets.ANIMESKIP_CLIENT_ID }}",
            "SUPABASE_PROJECT_ID": "${{ secrets.SUPABASE_PROJECT_ID }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "TURN_USERNAME": "${{ secrets.TURN_USERNAME }}",
            "TURN_PASSWORD": "${{ secrets.TURN_PASSWORD }}"
          }
          JSON_EOF

      - name: Build Linux Packages
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          dart pub global activate fastforge

          # Build .deb (AppImage is currently disabled due to tool-level file collision bugs)
          fastforge package --platform linux --targets deb --flutter-build-args=dart-define-from-file=dart-defines.json

          # Rename .deb file to match tar.gz convention
          mv dist/*/*.deb "skystream-linux-${{ matrix.arch }}-preview.deb"

          # Generate the standard .tar.gz bundle as well
          flutter build linux --release --dart-define-from-file=dart-defines.json
          cd build/linux/${{ matrix.arch }}/release/bundle
          tar -czvf "../../../../../skystream-linux-${{ matrix.arch }}-preview.tar.gz" .

      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            skystream-linux-${{ matrix.arch }}-preview.tar.gz
            skystream-linux-${{ matrix.arch }}-preview.deb
          retention-days: 7
